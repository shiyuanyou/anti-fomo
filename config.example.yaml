"""
测试配置 - 用于快速测试系统功能
复制此文件为 config.yaml 并修改为您的实际配置
"""

# 股票组合配置
portfolio:
  # 示例：简单的三指数配置
  holdings:
    - symbol: "000510"  # 中证A500
      name: "中证A500"
      type: "index"
      allocation_type: "ratio"
      value: 50  # 50%
    
    - symbol: "930050"  # 中证A50
      name: "中证A50"
      type: "index"
      allocation_type: "ratio"
      value: 30  # 30%
    
    - symbol: "932000"  # 中证2000
      name: "中证2000"
      type: "index"
      allocation_type: "ratio"
      value: 20  # 20%

# 波动率阈值配置（测试用，较敏感）
thresholds:
  portfolio_volatility:
    warning: 2.0   # 2% 触发警告（测试用）
    alert: 4.0     # 4% 触发警报
  
  individual_volatility:
    warning: 3.0   # 个股 3% 警告
    alert: 6.0     # 个股 6% 警报
  
  consecutive_days:
    warning: 3
    alert: 5

# AI 分析配置（默认关闭，需要时开启）
ai_analysis:
  enabled: false  # 改为 true 并填入 API key 以启用
  provider: "openai"
  model: "gpt-4"
  api_key: ""  # 在这里填入您的 OpenAI API Key
  
  prompt_template: |
    作为一位专业的投资顾问，请分析以下股票组合的波动情况：
    
    组合总波动：{total_volatility}%
    波动明细：
    {volatility_details}
    
    近期趋势：
    {recent_trend}
    
    请根据以上数据，从以下角度分析：
    1. 当前波动是否属于正常市场波动？
    2. 是否需要立即关注或采取行动？
    3. 给出具体的建议（持有、观察、调仓等）
    
    请用简洁专业的语言回答，避免引起投资者不必要的焦虑。

# 数据获取配置
data_fetch:
  period: "daily"  # daily 或 weekly
  start_date: "20240101"  # 开始日期，格式 YYYYMMDD
  end_date: null  # null 表示当前日期

# 通知配置
notification:
  enabled: true
  methods:
    - type: "console"  # 控制台输出（总是推荐）
    
    - type: "file"     # 文件日志（推荐）
      log_path: "./logs/alerts.log"
    
    # 邮件通知（可选，需配置）
    # - type: "email"
    #   smtp_host: "smtp.gmail.com"
    #   smtp_port: 587
    #   sender: "your-email@gmail.com"
    #   receiver: "your-email@gmail.com"
    #   password: "your-app-password"

# 调度配置
scheduler:
  check_time: "15:30"  # 每天检查时间（建议收盘后）
  timezone: "Asia/Shanghai"
  skip_weekends: true
  skip_holidays: true
