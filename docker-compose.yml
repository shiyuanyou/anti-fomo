version: '3.8'

services:
  # API Gateway
  traefik:
    image: traefik:v2.10
    container_name: anti-fomo-traefik
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
    networks:
      - anti-fomo-network

  # BFF Service
  bff:
    build:
      context: .
      dockerfile: docker/Dockerfile.bff
    container_name: anti-fomo-bff
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bff.rule=PathPrefix(`/api`)"
      - "traefik.http.services.bff.loadbalancer.server.port=8001"
    environment:
      - DATABASE_URL=sqlite:///data/bff/anti-fomo-bff.db
    volumes:
      - ./configs:/app/configs:ro
      - ./data/bff:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - anti-fomo-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: anti-fomo-backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/internal`)"
      - "traefik.http.services.backend.loadbalancer.server.port=8002"
    environment:
      - DATABASE_URL=sqlite:///data/jobs/anti-fomo-jobs.db
    volumes:
      - ./configs:/app/configs:ro
      - ./data/jobs:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - anti-fomo-network

  # Frontend Web
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        - VITE_APP_MODE=local
    container_name: anti-fomo-web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    depends_on:
      - bff
    restart: unless-stopped
    networks:
      - anti-fomo-network

networks:
  anti-fomo-network:
    driver: bridge
