version: '3.8'

services:
  # BFF Service
  bff:
    build:
      context: .
      dockerfile: docker/Dockerfile.bff
    container_name: anti-fomo-bff
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///data/bff/anti-fomo-bff.db
      - BACKEND_GRPC_ADDR=backend:50051
    volumes:
      - ./configs:/app/configs
      - ./data/bff:/app/data
      - ./scripts:/app/scripts:ro
      - ./web/public:/app/web/public:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - anti-fomo-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: anti-fomo-backend
    ports:
      - "8002:8002"
      - "50051:50051"
    environment:
      - DATABASE_URL=sqlite:///data/jobs/anti-fomo-jobs.db
      - BACKEND_GRPC_PORT=50051
    volumes:
      - ./configs:/app/configs:ro
      - ./data/jobs:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - anti-fomo-network

  # Frontend Web
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        - VITE_APP_MODE=local
    container_name: anti-fomo-web
    ports:
      - "3000:80"
    depends_on:
      - bff
    restart: unless-stopped
    networks:
      - anti-fomo-network

networks:
  anti-fomo-network:
    driver: bridge
