<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-FOMO | 资产配置认知工具</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js via CDN for radar/bar/pie charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-brand">
                <span class="header-logo">&#9678;</span>
                <h1>Anti-FOMO</h1>
            </div>
            <!-- Top-level view navigation -->
            <nav class="view-nav" id="view-nav">
                <button class="view-tab active" data-view="portfolio">我的配置</button>
                <button class="view-tab" data-view="templates">模板库</button>
                <button class="view-tab" data-view="compare">配置对比</button>
            </nav>
            <p class="header-sub">资产配置认知工具</p>
        </header>

        <!-- ============================================================
             VIEW: 我的配置 (original portfolio view)
             ============================================================ -->
        <main class="main view-panel active" id="view-portfolio">
            <!-- Sidebar: Input Area -->
            <aside class="sidebar">
                <div class="panel">
                    <div class="panel-header">
                        <span class="panel-indicator"></span>
                        输入区
                    </div>
                    <div class="panel-body">
                        <div class="form-group">
                            <label>资产名</label>
                            <input type="text" id="add-name" placeholder="e.g. 中证A500">
                        </div>
                        <div class="form-group">
                            <label>金额</label>
                            <input type="number" id="add-amount" placeholder="e.g. 50000">
                        </div>
                        <div class="form-group">
                            <label>股票代码</label>
                            <input type="text" id="add-code" placeholder="e.g. 000510">
                        </div>
                        <div class="form-group">
                            <label>风格</label>
                            <select id="add-style">
                                <option value="">选择风格</option>
                                <option>大盘价值</option>
                                <option>大盘成长</option>
                                <option>中小盘</option>
                                <option>商品对冲</option>
                                <option>防御型</option>
                                <option>新兴市场</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>国别</label>
                            <select id="add-region">
                                <option value="">选择区域</option>
                                <option>中国大陆</option>
                                <option>中国香港</option>
                                <option>美国</option>
                                <option>欧洲</option>
                                <option>印度</option>
                                <option>全球</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>类型</label>
                            <select id="add-type">
                                <option value="">选择类型</option>
                                <option>股票</option>
                                <option>大宗商品</option>
                                <option>货币基金</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="btn-add-asset">
                            <span class="btn-icon">+</span> 添加资产
                        </button>
                    </div>
                </div>

                <!-- Summary Panel -->
                <div class="panel panel-summary">
                    <div class="panel-header">
                        <span class="panel-indicator"></span>
                        配置概览
                    </div>
                    <div class="panel-body">
                        <div class="summary-item">
                            <span class="summary-label">资产数量</span>
                            <span class="summary-value" id="asset-count">--</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">总金额</span>
                            <span class="summary-value" id="total-amount">--</span>
                        </div>
                        <div class="summary-item">
                            <span class="summary-label">当前维度</span>
                            <span class="summary-value" id="current-dim">类型</span>
                        </div>
                        <button class="btn btn-save" id="btn-save-config">生成配置文件</button>
                        <div class="save-status" id="save-status"></div>
                    </div>
                </div>
            </aside>

            <!-- Display Area -->
            <section class="display">
                <div class="display-header">
                    <h2>展示区</h2>
                    <div class="dimension-tabs" id="dimension-tabs">
                        <button class="tab active" data-dim="type">类型</button>
                        <button class="tab" data-dim="region">区域</button>
                        <button class="tab" data-dim="style">风格</button>
                    </div>
                </div>
                <div class="treemap-wrapper">
                    <div class="treemap-container" id="treemap"></div>
                </div>
                <!-- Dimension detail legend -->
                <div class="detail-bar" id="detail-bar"></div>
            </section>
        </main>

        <!-- ============================================================
             VIEW: 模板库
             ============================================================ -->
        <main class="main view-panel" id="view-templates">
            <div class="templates-layout">
                <div class="templates-header-row">
                    <h2 class="section-title">配置模板库</h2>
                    <p class="section-desc">6 个经典资产配置策略，了解不同投资思路的量化特征与性格画像</p>
                    <div class="metrics-disclaimer">
                        数据来源：2010-2024 历史模拟回测，仅供认知参考，不构成投资建议
                    </div>
                </div>
                <div class="templates-grid" id="templates-grid">
                    <div class="templates-loading">加载模板中...</div>
                </div>
            </div>
        </main>

        <!-- ============================================================
             VIEW: 配置对比
             ============================================================ -->
        <main class="main view-panel" id="view-compare">
            <div class="compare-layout">
                <!-- Left: template selector + AI panel -->
                <aside class="compare-sidebar">
                    <div class="panel">
                        <div class="panel-header">
                            <span class="panel-indicator"></span>
                            选择对比模板
                        </div>
                        <div class="panel-body">
                            <select class="compare-select" id="compare-template-select">
                                <option value="">-- 请选择模板 --</option>
                            </select>
                            <button class="btn btn-primary" id="btn-run-compare">开始对比</button>
                        </div>
                    </div>

                    <!-- AI personality match -->
                    <div class="panel panel-ai">
                        <div class="panel-header">
                            <span class="panel-indicator panel-indicator-ai"></span>
                            AI 性格分析
                        </div>
                        <div class="panel-body">
                            <p class="ai-hint">基于当前配置，分析你的投资性格并推荐匹配模板</p>
                            <button class="btn btn-ai" id="btn-ai-match">分析我的性格</button>
                            <div class="ai-result" id="ai-match-result"></div>
                        </div>
                    </div>

                    <!-- AI migration advice -->
                    <div class="panel panel-ai" id="panel-ai-migrate" style="display:none">
                        <div class="panel-header">
                            <span class="panel-indicator panel-indicator-ai"></span>
                            AI 迁移建议
                        </div>
                        <div class="panel-body">
                            <button class="btn btn-ai" id="btn-ai-migrate">获取迁移建议</button>
                            <div class="ai-result" id="ai-migrate-result"></div>
                        </div>
                    </div>
                </aside>

                <!-- Right: comparison results -->
                <section class="compare-display" id="compare-display">
                    <div class="compare-empty">
                        <div class="compare-empty-icon">&#9635;</div>
                        <p>在左侧选择一个模板，开始与当前配置进行对比</p>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
    <script src="charts.js"></script>
    <script src="templates.js"></script>
    <script src="compare.js"></script>
</body>
</html>
