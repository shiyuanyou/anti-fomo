syntax = "proto3";

package antifomo;

service PortfolioService {
    rpc GetPortfolio(GetPortfolioRequest) returns (PortfolioResponse);
    rpc GetMarketData(GetMarketDataRequest) returns (MarketDataResponse);
    rpc AnalyzeWithAI(AIAnalyzeRequest) returns (AIAnalyzeResponse);
    rpc GenerateReport(ReportRequest) returns (ReportResponse);
    rpc RunDailyCheck(DailyCheckRequest) returns (DailyCheckResponse);
    rpc RunWeeklyReport(WeeklyReportRequest) returns (WeeklyReportResponse);
}

message GetPortfolioRequest {
    string user_id = 1;
}

message PortfolioResponse {
    repeated Holding holdings = 1;
    double total_value = 2;
    string error = 3;
}

message Holding {
    string symbol = 1;
    string name = 2;
    double weight = 3;
    double value = 4;
    double current_price = 5;
    double change_pct = 6;
}

message GetMarketDataRequest {
    repeated string symbols = 1;
    string period = 2;
}

message MarketDataResponse {
    repeated MarketData data = 1;
    string error = 3;
}

message MarketData {
    string symbol = 1;
    string name = 2;
    double current_price = 3;
    double change_pct = 4;
    double volatility = 5;
    string market_status = 6;
}

message AIAnalyzeRequest {
    PortfolioResponse portfolio = 1;
    MarketDataResponse market_data = 2;
    string analysis_type = 3;
}

message AIAnalyzeResponse {
    string analysis = 1;
    repeated string recommendations = 2;
    string error = 3;
}

message ReportRequest {
    string report_type = 1;
    string period = 2;
}

message ReportResponse {
    string report_id = 1;
    string title = 2;
    string content = 3;
    map<string, string> metadata = 4;
    string error = 5;
}

message DailyCheckRequest {
    bool force = 1;
}

message DailyCheckResponse {
    string job_id = 1;
    string status = 2;
    string message = 3;
}

message WeeklyReportRequest {
    bool force = 1;
}

message WeeklyReportResponse {
    string job_id = 1;
    string report_id = 2;
    string status = 3;
    string message = 4;
}
